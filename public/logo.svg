<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#2dd4c0"/>
      <stop offset="55%" stop-color="#5b8ef5"/>
      <stop offset="100%" stop-color="#b06ee8"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer white ring -->
  <circle cx="100" cy="100" r="98" fill="white"/>
  <!-- Gradient background circle -->
  <circle cx="100" cy="100" r="92" fill="url(#bg)"/>
  <!-- Radial glow overlay -->
  <circle cx="100" cy="100" r="92" fill="url(#glow)"/>

  <!-- Plate (center-left) -->
  <g filter="url(#glow3)" opacity="0.9">
    <circle cx="88" cy="118" r="38" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
    <circle cx="88" cy="118" r="38" fill="rgba(255,255,255,0.12)"/>
    <circle cx="88" cy="118" r="27" fill="rgba(255,255,255,0.18)"/>
    <circle cx="88" cy="118" r="27" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2.5"/>
    <circle cx="88" cy="118" r="38" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
  </g>

  <!-- Small bubble top-left (decorative) -->
  <circle cx="62" cy="75" r="14" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.6)" stroke-width="2"/>
  <circle cx="55" cy="63" r="9" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.55)" stroke-width="1.8"/>

  <!-- Chef hat (top-right) -->
  <g filter="url(#glow3)" opacity="0.92">
    <!-- Hat brim -->
    <rect x="106" y="72" width="48" height="11" rx="5" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.75)" stroke-width="2"/>
    <!-- Hat body puff left -->
    <ellipse cx="118" cy="60" rx="14" ry="17" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.72)" stroke-width="2"/>
    <!-- Hat body puff right (main dome) -->
    <ellipse cx="136" cy="55" rx="18" ry="22" fill="rgba(255,255,255,0.22)" stroke="rgba(255,255,255,0.78)" stroke-width="2"/>
    <!-- Crease on hat -->
    <path d="M128,73 Q130,58 136,56" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Fork + spoon handle (bottom-right area) -->
  <g filter="url(#glow3)" opacity="0.9" transform="rotate(-35, 145, 145)">
    <!-- Spoon bowl -->
    <ellipse cx="145" cy="122" rx="13" ry="10" fill="rgba(200,180,255,0.25)" stroke="rgba(220,200,255,0.85)" stroke-width="2.2"/>
    <!-- Spoon handle -->
    <rect x="141" y="131" width="8" height="32" rx="4" fill="rgba(200,180,255,0.2)" stroke="rgba(220,200,255,0.8)" stroke-width="2"/>
    <!-- Fork tines -->
    <line x1="133" y1="120" x2="133" y2="108" stroke="rgba(220,200,255,0.85)" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="137" y1="120" x2="137" y2="106" stroke="rgba(220,200,255,0.85)" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="141" y1="120" x2="141" y2="108" stroke="rgba(220,200,255,0.85)" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M133,120 Q137,126 141,120" stroke="rgba(220,200,255,0.85)" stroke-width="1.8" fill="none"/>
    <!-- Fork handle -->
    <line x1="137" y1="126" x2="137" y2="158" stroke="rgba(220,200,255,0.8)" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <!-- Subtle inner highlight arc -->
  <path d="M40,65 Q80,28 140,45" stroke="rgba(255,255,255,0.2)" stroke-width="8" fill="none" stroke-linecap="round"/>
</svg>
